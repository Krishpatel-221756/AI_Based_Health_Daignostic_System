version: '3.8'

services:
  backend:
    build: ./backend
    container_name: health_backend
    ports:
      - "8000:8000"
    volumes:
      # Persist the database file
      - ./backend/health.db:/app/health.db
    restart: always

  frontend:
    build: ./frontend
    container_name: health_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: always
