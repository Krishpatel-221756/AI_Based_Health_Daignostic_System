services:
  # Backend Service
  - type: web
    name: ai-health-backend
    runtime: python
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app.main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:////app/data/health.db # Persistent SQLite path
    disk:
      name: health-db
      mountPath: /app/data
      sizeGB: 1

  # Frontend Service
  - type: web
    name: ai-health-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    publishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        # In a real setup, we'd use the backend URL here. 
        # For now, this is just a placeholder to show it's needed.
        value: https://ai-health-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
